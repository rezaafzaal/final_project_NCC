sonar.projectKey=siem-dashboard
sonar.projectName=SIEM Dashboard
sonar.projectVersion=1.0

sonar.sources=backend/app
sonar.tests=backend/tests
sonar.exclusions=**/__pycache__/**,**/*.pyc,backend/logs/**,frontend/**,**/.pytest_cache/**,backend/app/core/log_generator.py

sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

sonar.coverage.exclusions=backend/app/main.py,backend/app/db/database.py,backend/app/core/log_collector.py,backend/app/core/log_generator.py,backend/app/api/websocket.py,backend/app/api/routes.py

# Ignore rules that produce false positives on simulation/test code
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# Ignore type-hint style issue on log_collector
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S7484
sonar.issue.ignore.multicriteria.e1.resourceKey=backend/app/core/log_collector.py

# Ignore "weak crypto" on log_generator — random module is intentional for simulation data
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S2245
sonar.issue.ignore.multicriteria.e2.resourceKey=backend/app/core/log_generator.py

# Ignore "hardcoded IP" on log_generator — test IPs are intentional demo data
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.e3.resourceKey=backend/app/core/log_generator.py

# Ignore "hardcoded IP" on log_parser — sample IPs in comments/patterns
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.e4.resourceKey=backend/app/core/log_parser.py

